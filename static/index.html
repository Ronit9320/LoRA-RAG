<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robin AI Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #161b22;
            padding: 16px 24px;
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        header h1 {
            font-size: 20px;
            font-weight: 600;
        }

        header .badge {
            background: #238636;
            color: #fff;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message.user {
            align-self: flex-end;
            background: #238636;
            color: #fff;
        }

        .message.robin {
            align-self: flex-start;
            background: #21262d;
            border: 1px solid #30363d;
        }

        .message .role {
            font-size: 11px;
            text-transform: uppercase;
            opacity: 0.7;
            margin-bottom: 4px;
        }

        #input-area {
            background: #161b22;
            padding: 16px 24px;
            border-top: 1px solid #30363d;
            display: flex;
            gap: 12px;
        }

        #user-input {
            flex: 1;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 12px 16px;
            color: #e6edf3;
            font-size: 15px;
            resize: none;
            outline: none;
            font-family: inherit;
        }

        #user-input:focus {
            border-color: #238636;
        }

        #send-btn {
            background: #238636;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
        }

        #send-btn:hover {
            background: #2ea043;
        }

        #send-btn:disabled {
            background: #21262d;
            cursor: not-allowed;
        }

        .loading {
            display: none;
            align-self: flex-start;
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 12px 16px;
            color: #8b949e;
        }

        .loading.active {
            display: block;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #238636;
            border-radius: 50%;
            margin-left: 8px;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        #user-input:disabled {
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <header>
        <h1>Robin</h1>
        <span class="badge">AI</span>
    </header>

    <div id="chat-container">
        <div class="message robin">
            <div class="role">Robin</div>
            <div>Hello! I'm Robin. How can I help you today?</div>
        </div>
    </div>

    <div class="loading" id="loading">Thinking</div>

    <div id="input-area">
        <textarea id="user-input" placeholder="Type your message..." rows="1"></textarea>
        <button id="send-btn">Send</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const loading = document.getElementById('loading');

        let messages = [];

        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            userInput.value = '';
            addMessage('user', text);
            messages.push({ role: 'user', content: text });

            loading.classList.add('active');
            userInput.disabled = true;
            sendBtn.disabled = true;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages, user_input: text })
                });

                const data = await response.json();
                loading.classList.remove('active');

                if (data.response) {
                    addMessage('robin', data.response);
                    messages.push({ role: 'assistant', content: data.response });
                } else if (data.detail) {
                    addMessage('robin', `Error: ${data.detail}`);
                }
            } catch (error) {
                loading.classList.remove('active');
                addMessage('robin', `Error: ${error.message}`);
            }

            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.focus();
        }

        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = `<div class="role">${role === 'user' ? 'You' : 'Robin'}</div><div>${escapeHtml(text)}</div>`;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>

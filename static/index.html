<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robin</title>
    <style>
        :root {
            --bg-primary: #0d0d0d;
            --bg-secondary: #1a1a1a;
            --bg-tertiary: #252525;
            --bg-input: #1a1a1a;
            --border: #2f2f2f;
            --text-primary: #e8e8e8;
            --text-secondary: #a0a0a0;
            --text-muted: #666666;
            --accent: #10a37f;
            --accent-hover: #1a7f64;
            --user-bubble: #10a37f;
            --user-bubble-text: #ffffff;
            --assistant-bubble: #1a1a1a;
            --assistant-border: #2f2f2f;
            --scrollbar: #3a3a3a;
            --radius: 12px;
            --radius-sm: 8px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-family: 'Söhne', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(13, 13, 13, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            width: 32px;
            height: 32px;
            background: var(--accent);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        h1 {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        /* Chat Container */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 80px 24px 120px;
            display: flex;
            flex-direction: column;
            gap: 0;
            scroll-behavior: smooth;
        }

        #chat-container::-webkit-scrollbar {
            width: 8px;
        }

        #chat-container::-webkit-scrollbar-track {
            background: transparent;
        }

        #chat-container::-webkit-scrollbar-thumb {
            background: var(--scrollbar);
            border-radius: 4px;
        }

        /* Welcome Screen */
        .welcome-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
            min-height: 400px;
        }

        .welcome-logo {
            width: 64px;
            height: 64px;
            background: var(--accent);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
        }

        .welcome-logo svg {
            width: 40px;
            height: 40px;
            fill: white;
        }

        .welcome-screen h2 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .welcome-screen p {
            color: var(--text-secondary);
            font-size: 15px;
            max-width: 400px;
        }

        /* Message Styles */
        .message-group {
            padding: 24px 0;
            border-bottom: 1px solid var(--border);
        }

        .message-group:last-child {
            border-bottom: none;
        }

        .message-row {
            display: flex;
            gap: 12px;
            max-width: 800px;
            margin: 0 auto;
        }

        .message-row.user {
            flex-direction: row-reverse;
        }

        .avatar {
            width: 28px;
            height: 28px;
            border-radius: 4px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .avatar.user {
            background: var(--user-bubble);
        }

        .avatar.assistant {
            background: linear-gradient(135deg, #10a37f, #0d8a6e);
        }

        .avatar svg {
            width: 16px;
            height: 16px;
            fill: white;
        }

        .message-content {
            flex: 1;
            min-width: 0;
        }

        .message-content.user .bubble {
            background: var(--user-bubble);
            color: var(--user-bubble-text);
            border: none;
        }

        .message-content.assistant .bubble {
            background: transparent;
            border: 1px solid var(--assistant-border);
        }

        .bubble {
            padding: 12px 16px;
            border-radius: var(--radius);
            font-size: 15px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .message-actions {
            display: flex;
            gap: 8px;
            margin-top: 4px;
            padding-left: 12px;
            opacity: 0;
            transition: opacity 0.15s;
        }

        .message-row:hover .message-actions {
            opacity: 1;
        }

        .action-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .action-btn:hover {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
        }

        /* Input Area */
        #input-wrapper {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 16px 24px 24px;
            background: linear-gradient(to top, var(--bg-primary) 60%, transparent);
        }

        #input-container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            display: flex;
            align-items: flex-end;
            padding: 12px 16px;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        #input-container:focus-within {
            border-color: var(--text-muted);
            box-shadow: 0 0 0 2px rgba(16, 163, 127, 0.1);
        }

        #user-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 15px;
            line-height: 1.5;
            resize: none;
            max-height: 200px;
            outline: none;
            font-family: inherit;
        }

        #user-input::placeholder {
            color: var(--text-muted);
        }

        #send-btn {
            background: var(--accent);
            border: none;
            border-radius: 6px;
            padding: 8px 16px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #send-btn:hover {
            background: var(--accent-hover);
        }

        #send-btn:disabled {
            background: var(--bg-tertiary);
            color: var(--text-muted);
            cursor: not-allowed;
        }

        .input-toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding-bottom: 8px;
            margin-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }

        .tool-btn {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 6px 12px;
            color: var(--text-secondary);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tool-btn:hover {
            background: var(--bg-tertiary);
            border-color: var(--text-muted);
        }

        /* Typing Indicator */
        .typing-indicator {
            display: none;
            padding: 20px;
            align-items: center;
            gap: 8px;
        }

        .typing-indicator.active {
            display: flex;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: typingPulse 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingPulse {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-4px); opacity: 1; }
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            header {
                padding: 0 16px;
            }

            #chat-container {
                padding: 70px 16px 100px;
            }

            .message-row {
                padding: 0 8px;
            }

            #input-wrapper {
                padding: 12px 16px 16px;
            }

            .welcome-screen h2 {
                font-size: 22px;
            }
        }

        /* Empty State */
        .empty-state {
            display: none;
        }

        .chat-empty .empty-state {
            display: flex;
        }

        .chat-empty .messages-container {
            display: none;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <div class="logo">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                </svg>
            </div>
            <h1>Robin</h1>
        </div>
        <div class="header-actions">
            <button class="icon-btn" onclick="clearChat()" title="New Chat">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 5v14M5 12h14"/>
                </svg>
            </button>
        </div>
    </header>

    <div id="chat-container" class="chat-empty">
        <div class="messages-container"></div>
        
        <div class="welcome-screen empty-state">
            <div class="welcome-logo">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                </svg>
            </div>
            <h2>How can I help you today?</h2>
            <p>You can ask me questions, have conversations, or request help with tasks. I'll do my best to assist you.</p>
        </div>

        <div class="typing-indicator" id="typing-indicator">
            <div class="avatar assistant">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                </svg>
            </div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
        </div>
    </div>

    <div id="input-wrapper">
        <div id="input-container">
            <textarea id="user-input" placeholder="Message Robin..." rows="1"></textarea>
            <button id="send-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15-2-15 2z"/>
                </svg>
            </button>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const messagesContainer = chatContainer.querySelector('.messages-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const typingIndicator = document.getElementById('typing-indicator');
        const inputContainer = document.getElementById('input-container');

        let messages = [];
        let conversationId = Date.now();

        // Auto-resize textarea
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 200) + 'px';
        });

        // Send on Enter (not shift+enter)
        userInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text || sendBtn.disabled) return;

            chatContainer.classList.remove('chat-empty');
            userInput.value = '';
            userInput.style.height = 'auto';
            
            addMessage('user', text);
            messages.push({ role: 'user', content: text });

            showTyping();
            userInput.disabled = true;
            sendBtn.disabled = true;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages, user_input: text })
                });

                const data = await response.json();
                hideTyping();

                if (data.response) {
                    addMessage('assistant', data.response);
                    messages.push({ role: 'assistant', content: data.response });
                } else if (data.detail) {
                    addMessage('assistant', `Error: ${data.detail}`);
                }
            } catch (error) {
                hideTyping();
                addMessage('assistant', `Error: ${error.message}`);
            }

            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.focus();
        }

        function addMessage(role, text) {
            const escaped = escapeHtml(text);
            
            const messageGroup = document.createElement('div');
            messageGroup.className = 'message-group';
            
            messageGroup.innerHTML = `
                <div class="message-row ${role}">
                    <div class="avatar ${role}">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            ${role === 'user' 
                                ? '<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>'
                                : '<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 4-2 5.39v2.05z"/>'
                            }
                        </svg>
                    </div>
                    <div class="message-content ${role}">
                        <div class="bubble">${formatMessage(escaped)}</div>
                        <div class="message-actions">
                            <button class="action-btn" onclick="copyMessage(this)">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                                </svg>
                                Copy
                            </button>
                        </div>
                    </div>
                </div>
            `;
            
            messagesContainer.appendChild(messageGroup);
            scrollToBottom();
        }

        function formatMessage(text) {
            // Basic markdown-like formatting
            return text
                .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                .replace(/\*([^*]+)\*/g, '<em>$1</em>')
                .replace(/\n/g, '<br>');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showTyping() {
            messagesContainer.appendChild(typingIndicator);
            typingIndicator.classList.add('active');
            scrollToBottom();
        }

        function hideTyping() {
            typingIndicator.classList.remove('active');
            if (typingIndicator.parentNode) {
                typingIndicator.parentNode.removeChild(typingIndicator);
            }
        }

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function copyMessage(btn) {
            const bubble = btn.closest('.message-group').querySelector('.bubble');
            const text = bubble.textContent;
            navigator.clipboard.writeText(text).then(() => {
                btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 13"/></svg> Copied';
                setTimeout(() => {
                    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy';
                }, 2000);
            });
        }

        function clearChat() {
            if (confirm('Start a new chat? This will clear the current conversation.')) {
                messages = [];
                messagesContainer.innerHTML = '';
                chatContainer.classList.add('chat-empty');
                userInput.focus();
            }
        }

        // Remove welcome screen when user sends first message
        userInput.addEventListener('keydown', function() {
            if (messages.length === 0) {
                chatContainer.classList.remove('chat-empty');
            }
        }, { once: true });

        // Focus input on load
        userInput.focus();
    </script>
</body>
</html>
